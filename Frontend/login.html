<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ | UniSports</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">

  <!-- Brand -->
  <div class="brand-header">
    <a href="index.html" class="brand-name">UniSports.</a>
  </div>

  <!-- Auth Card -->
  <div class="auth-card">

    <!-- iOS Segmented Control -->
    <div class="segmented-control">
      <div class="segment-indicator" id="segmentIndicator"></div>
      <button class="segment-btn active" id="tabLogin"    onclick="switchTab('login')">เข้าสู่ระบบ</button>
      <button class="segment-btn"        id="tabRegister" onclick="switchTab('register')">สมัครสมาชิก</button>
    </div>

    <!-- Alert Banner -->
    <div class="alert-banner" id="alertBanner"></div>

    <!-- ── Login Form ── -->
    <div class="form-section active" id="formLogin">
      <h2 class="card-title">ยินดีต้อนรับกลับมา</h2>

      <div class="input-group">
        <label class="input-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          รหัสนิสิต
        </label>
        <input type="text" id="login_student_id" class="input-field"
               placeholder="ตัวอย่าง 6401234567" autocomplete="username">
      </div>

      <div class="input-group" style="margin-bottom:22px;">
        <label class="input-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          รหัสผ่าน
        </label>
        <input type="password" id="login_password" class="input-field"
               placeholder="กรอกรหัสผ่านของคุณ" autocomplete="current-password">
      </div>

      <button class="btn-primary" id="btnLogin" onclick="processLogin()">เข้าสู่ระบบ</button>

      <div style="text-align:center; margin-top:20px;">
        <a href="forgot.html" style="font-size:13px; color:var(--text-secondary); font-weight:300;">ลืมรหัสผ่านหรือไม่?</a>
      </div>
    </div>

    <!-- ── Register Form ── -->
    <div class="form-section" id="formRegister">
      <h2 class="card-title">สร้างบัญชีใหม่</h2>

      <div class="input-group">
        <label class="input-label">รหัสนิสิต</label>
        <input type="text" id="reg_student_id" class="input-field" placeholder="ตัวอย่าง 6401234567">
      </div>

      <div class="form-row-2">
        <div class="input-group">
          <label class="input-label">ชื่อ</label>
          <input type="text" id="reg_first_name" class="input-field" placeholder="ชื่อจริง">
        </div>
        <div class="input-group">
          <label class="input-label">นามสกุล</label>
          <input type="text" id="reg_last_name" class="input-field" placeholder="นามสกุล">
        </div>
      </div>

      <div class="form-row-2">
        <div class="input-group">
          <label class="input-label">ชั้นปี</label>
          <select id="reg_year" class="select-field">
            <option value="" disabled selected>เลือก</option>
            <option value="1">ปี 1</option>
            <option value="2">ปี 2</option>
            <option value="3">ปี 3</option>
            <option value="4">ปี 4</option>
            <option value="5+">ปี 5 ขึ้นไป</option>
          </select>
        </div>
        <div class="input-group">
          <label class="input-label">คณะ</label>
          <select id="reg_faculty" class="select-field">
            <option value="" disabled selected>เลือก</option>
            <option>วิศวกรรมศาสตร์</option>
            <option>วิทยาศาสตร์การกีฬาและสุขภาพ</option>
            <option>เกษตร</option>
            <option>ศิลปศาสตร์และวิทยาศาสตร์</option>
            <option>ศึกษาศาสตร์และพัฒนศาสตร์</option>
            <option>อุตสาหกรรมบริการ</option>
            <option>สัตวแพทยศาสตร์</option>
          </select>
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">สาขาวิชา</label>
        <input type="text" id="reg_major" class="input-field" placeholder="เช่น วิศวกรรมคอมพิวเตอร์">
      </div>

      <div class="input-group" style="margin-bottom:22px;">
        <label class="input-label">ตั้งรหัสผ่าน</label>
        <input type="password" id="reg_password" class="input-field" placeholder="ความยาวอย่างน้อย 8 ตัวอักษร">
      </div>

      <button class="btn-primary" id="btnRegister" onclick="processRegister()">สร้างบัญชี</button>


    </div>

  </div><!-- /auth-card -->

  <script src="js/login.js"></script>
</body>
</html>
