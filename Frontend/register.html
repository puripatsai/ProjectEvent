<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ลงทะเบียน | UniSports</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── Navbar ─────────────────────────────────────────────── -->
  <nav>
    <a href="index.html" class="logo">UniSports.</a>
    <div class="nav-actions">
      <a href="index.html" class="nav-link">หน้าแรก</a>
      <a href="profile.html" class="user-avatar hidden" id="navUser" title="โปรไฟล์"></a>
      <button class="btn-logout hidden" id="btnLogout" onclick="logout()">ออกจากระบบ</button>
      <a href="login.html" class="nav-link" id="btnLogin">เข้าสู่ระบบ</a>
    </div>
  </nav>

  <!-- ── Content ────────────────────────────────────────────── -->
  <div class="register-page">
    <div class="register-grid">

      <!-- ข้อมูลกิจกรรม (dark panel) -->
      <div class="event-info-panel" id="eventInfo">
        <p style="color:rgba(255,255,255,0.5); font-size:14px;">กำลังโหลด...</p>
      </div>

      <!-- ฟอร์มลงทะเบียน -->
      <div class="form-card">
        <div class="form-header">
          <h2>ลงทะเบียนเข้าร่วม</h2>
          <p>กรอกข้อมูลของคุณให้ครบถ้วน</p>
        </div>
        <div class="form-body">
          <div class="form-alert" id="formAlert"></div>

          <div class="form-row">
            <div class="form-group">
              <label>ชื่อ <span class="req">*</span></label>
              <input type="text" id="first_name" placeholder="ชื่อจริง">
            </div>
            <div class="form-group">
              <label>นามสกุล <span class="req">*</span></label>
              <input type="text" id="last_name" placeholder="นามสกุล">
            </div>
          </div>

          <div class="form-group">
            <label>รหัสนักศึกษา <span class="req">*</span></label>
            <input type="text" id="student_id" placeholder="เช่น 6401234567">
          </div>

          <div class="form-group">
            <label>คณะ <span class="req">*</span></label>
            <select id="faculty">
              <option value="">-- เลือกคณะ --</option>
              <option>วิศวกรรมศาสตร์</option>
              <option>วิทยาศาสตร์การกีฬาและสุขภาพ</option>
              <option>เกษตร</option>
              <option>ศิลปศาสตร์และวิทยาศาสตร์</option>
              <option>ศึกษาศาสตร์และพัฒนศาสตร์</option>
              <option>อุตสาหกรรมบริการ</option>
              <option>สัตวแพทยศาสตร์</option>
            </select>
          </div>

          <div class="form-group">
            <label>เบอร์โทรศัพท์</label>
            <input type="tel" id="phone" placeholder="เช่น 0812345678">
          </div>

          <button class="btn-submit" onclick="submitRegister()">ยืนยันลงทะเบียน</button>
        </div>
      </div>

      <!-- ตารางผู้เข้าร่วม -->
      <div class="participants-section">
        <div class="participants-header">
          <h2>รายชื่อผู้เข้าร่วม</h2>
          <span class="count-badge" id="countBadge">0 คน</span>
        </div>
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>ชื่อ-นามสกุล</th>
              <th>รหัสนักศึกษา</th>
              <th>คณะ</th>
              <th>เบอร์โทร</th>
              <th>ยกเลิก</th>
            </tr>
          </thead>
          <tbody id="participantList">
            <tr><td colspan="6" class="empty-table">ยังไม่มีผู้ลงทะเบียน</td></tr>
          </tbody>
        </table>
      </div>

    </div><!-- /register-grid -->
  </div><!-- /register-page -->

  <script src="js/register.js"></script>
</body>
</html>
