<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียน</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav>
    <a href="index.html" class="logo">🏆 <span>UniSports</span></a>
    <div class="nav-right">
        <a href="index.html">หน้าแรก</a>
        <a href="profile.html" id="navUser" style="color:#FFD700; font-size:14px; font-weight:600; text-decoration:none; margin-left:24px;"></a>
        <button class="btn-logout" id="navLogout" onclick="logout()" style="display:none">ออกจากระบบ</button>
        <a href="login.html" id="navLogin">เข้าสู่ระบบ</a>
    </div>
</nav>

<div class="register-container">
    <div class="event-info" id="eventInfo"><p>กำลังโหลด...</p></div>
    <div class="form-card">
        <div class="form-header" style="background:#f5f5f5; padding:20px 24px; border-bottom:1px solid #e0e0e0;">
            <h2 style="color:#1a237e; font-size:18px;">📋 ลงทะเบียนเข้าร่วม</h2>
        </div>
        <div class="form-body" style="padding:24px;">
            <div class="alert" id="alert"></div>
            <div class="form-row">
                <div class="form-group">
                    <label>ชื่อ <span>*</span></label>
                    <input type="text" id="first_name" placeholder="ชื่อจริง">
                </div>
                <div class="form-group">
                    <label>นามสกุล <span>*</span></label>
                    <input type="text" id="last_name" placeholder="นามสกุล">
                </div>
            </div>
            <div class="form-group">
                <label>รหัสนักศึกษา <span>*</span></label>
                <input type="text" id="student_id" placeholder="เช่น 6401234567">
            </div>
            <div class="form-group">
                <label>คณะ <span>*</span></label>
                <select id="faculty">
                    <option value="">-- เลือกคณะ --</option>
                    <option>วิศวกรรมศาสตร์</option>
                    <option>วิทยาศาสตร์</option>
                    <option>บริหารธุรกิจ</option>
                    <option>นิติศาสตร์</option>
                    <option>แพทยศาสตร์</option>
                    <option>อักษรศาสตร์</option>
                    <option>เศรษฐศาสตร์</option>
                    <option>ครุศาสตร์</option>
                    <option>อื่นๆ</option>
                </select>
            </div>
            <div class="form-group">
                <label>เบอร์โทรศัพท์</label>
                <input type="tel" id="phone" placeholder="เช่น 0812345678">
            </div>
            <button class="btn-submit" onclick="register()">✅ ยืนยันลงทะเบียน</button>
        </div>
    </div>

    <div class="participants-wrap">
        <div class="participants-header">
            <h2>👥 รายชื่อผู้เข้าร่วม</h2>
            <span class="count-badge" id="countBadge">0 คน</span>
        </div>
        <table>
            <thead>
                <tr>
                    <th>#</th><th>ชื่อ-นามสกุล</th><th>รหัสนักศึกษา</th>
                    <th>คณะ</th><th>เบอร์โทร</th><th>ยกเลิก</th>
                </tr>
            </thead>
            <tbody id="participantList">
                <tr><td colspan="6" class="empty-table">ยังไม่มีผู้ลงทะเบียน</td></tr>
            </tbody>
        </table>
    </div>
</div>
<script src="js/register.js"></script>
</body>
</html>
