<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>โปรไฟล์ | UniSports</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── Navbar ─────────────────────────────────────────────── -->
  <nav>
    <a href="index.html" class="logo">UniSports.</a>
    <div class="nav-actions">
      <a href="index.html" class="nav-link">หน้าแรก</a>
      <a href="profile.html" class="user-avatar" id="navUser" title="โปรไฟล์"></a>
      <button class="btn-logout" id="btnLogout" onclick="logout()">ออกจากระบบ</button>
    </div>
  </nav>

  <!-- ── Profile Page ───────────────────────────────────────── -->
  <div class="profile-page">

    <!-- Profile Card -->
    <div class="profile-card">
      <div class="profile-header">
        <!-- Avatar วงกลม SVG user icon -->
        <div class="profile-avatar" id="avatarEl"></div>
        <div>
          <div class="profile-name" id="profileName">กำลังโหลด...</div>
          <div class="profile-id"   id="profileId"></div>
          <div class="role-badge"   id="roleBadge"></div>
        </div>
      </div>
      <div class="profile-body">
        <div class="info-item"><label>คณะ</label>      <p id="infoFaculty">-</p></div>
        <div class="info-item"><label>สาขาวิชา</label> <p id="infoMajor">-</p></div>
        <div class="info-item"><label>ชั้นปี</label>   <p id="infoYear">-</p></div>
        <div class="info-item"><label>รหัสนิสิต</label><p id="infoStudentId">-</p></div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="statTotal">0</div>   <div class="stat-label">กิจกรรมที่ลงทะเบียน</div></div>
      <div class="stat-card"><div class="stat-num" id="statUpcoming">0</div><div class="stat-label">กิจกรรมที่กำลังจะมาถึง</div></div>
      <div class="stat-card"><div class="stat-num" id="statPast">0</div>    <div class="stat-label">กิจกรรมที่ผ่านมาแล้ว</div></div>
    </div>

    <!-- My Events -->
    <div class="section-heading">กิจกรรมที่ลงทะเบียนไว้</div>
    <div class="event-list" id="myEvents">
      <div class="profile-empty">กำลังโหลด...</div>
    </div>

  </div>

  <script src="js/profile.js"></script>
</body>
</html>
